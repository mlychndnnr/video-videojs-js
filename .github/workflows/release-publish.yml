name: Release Publish

# Stage 2: Triggered on every push to master.
# If package.json version differs from the latest git tag, creates the tag,
# publishes to npm + S3 via use-shared-publish.yml, and creates a GitHub Release.

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to auto-detect from package.json)'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  check-release:
    name: Check if New Release
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.check.outputs.should-publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Check for new version
        id: check
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(jq -r '.version' package.json)
          fi

          LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's/^v//')

          echo "Package version : $VERSION"
          echo "Latest git tag  : ${LATEST_TAG:-none}"

          if [ "$VERSION" != "$LATEST_TAG" ]; then
            echo "should-publish=true" >> $GITHUB_OUTPUT
          else
            echo "should-publish=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  create-tag-and-release:
    name: Tag and GitHub Release
    needs: check-release
    if: needs.check-release.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create git tag
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          TAG="v$VERSION"

          if git tag -l "$TAG" | grep -q "^$TAG$"; then
            echo "Tag $TAG already exists — skipping creation"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          TAG="v$VERSION"

          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping"
          else
            gh release create "$TAG" \
              --title "Release $TAG" \
              --generate-notes \
              --verify-tag
            echo "Created GitHub Release $TAG"
          fi

      - name: Summary
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          echo "## ✅ Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: [v$VERSION](https://github.com/${{ github.repository }}/releases/tag/v$VERSION)" >> $GITHUB_STEP_SUMMARY
          echo "**npm**: [@newrelic/video-videojs@$VERSION](https://www.npmjs.com/package/@newrelic/video-videojs/v/$VERSION)" >> $GITHUB_STEP_SUMMARY
          echo "**S3**: \`media-agents/browser/videojs\`" >> $GITHUB_STEP_SUMMARY

  publish:
    name: Build and Publish
    needs: [create-tag-and-release]
    uses: ./.github/workflows/use-shared-publish.yml
    secrets: inherit
